<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover Matsubushi</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5fff8;
  color: #333;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  animation: fadeIn 2s;
}

h1 {
  font-size: 45px;
  margin-bottom: 10px;
}

p {
  font-size: 20px;
}

.card {
  margin: 20px;
  padding: 25px;
  border-radius: 20px;
  background: white;
  box-shadow: 0 5px 20px #ddd;
  animation: slideUp 1s;
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

@keyframes slideUp {
  from {
    transform: translateY(40px);
    opacity:0;
  }
  to {
    transform: translateY(0);
    opacity:1;
  }
}
</style>
</head>

<body>

<section class="hero">
<div>
<h1>Discover Matsubushi</h1>
<p>まだ知らない松伏町の魅力を見つけよう。</p>
</div>
</section>

<div class="card">
<h2>📍 観光スポット</h2>
<p>自然・公園・おすすめの場所を紹介</p>
</div>

<div class="card">
<h2>🍜 グルメ</h2>
<p>松伏町のおいしいお店を紹介</p>
</div>

<div class="card">
<h2>🎉 イベント</h2>
<p>地域のイベント情報を発信</p>
</div>

</body>
</html>
