<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discover Matsubushi 編集</title>

<style>
body{
  font-family:sans-serif;
  background:#f5fff8;
  padding:20px;
}

.box{
  background:white;
  padding:25px;
  border-radius:20px;
  max-width:600px;
  margin:auto;
  box-shadow:0 5px 20px #ddd;
}

input, textarea, button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}

button{
  background:#2e8b57;
  color:white;
  border:none;
}
</style>

</head>

<body>

<div class="box">

<h1>📝 Discover Matsubushi 編集</h1>

<h2>トップページ文章</h2>

<textarea id="intro" rows="6" placeholder="紹介文を入力"></textarea>

<h2>📍観光スポット</h2>

<input placeholder="場所の名前">

<textarea placeholder="説明"></textarea>


<h2>🍜グルメ</h2>

<input placeholder="お店の名前">

<textarea placeholder="紹介"></textarea>


<h2>🎉イベント</h2>

<input placeholder="イベント名">

<textarea placeholder="内容"></textarea>


<button onclick="saveData()">保存する</button>
<button onclick="downloadData()">更新ファイル作成</button>

<script>
function downloadData(){

let text = document.getElementById("intro").value;

let data = {
intro:text
};

let blob = new Blob(
[JSON.stringify(data)],
{type:"application/json"}
);

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="data.json";
a.click();

}
</script>

</div>
<script>
function saveData(){

alert("保存しました！");

}
  <button onclick="downloadData()">更新ファイル作成</button>

<script>
function downloadData(){

let text = document.getElementById("intro").value;

let data = {
intro:text
};

let blob = new Blob(
[JSON.stringify(data)],
{type:"application/json"}
);

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="data.json";
a.click();

}
</script>
</script>
</body>
</html>
